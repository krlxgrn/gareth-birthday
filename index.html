<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Quiz 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;

    /* background image */
    background: url("background.jpg") center center / cover no-repeat;
}

/* dark overlay for readability */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.35); /* adjust darkness here */
    z-index: 0;
}

    .card {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 40px;
        width: 90%;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        color: white;
        transition: all 0.5s ease;
    }

    .card {
    position: relative;
    z-index: 1;
}

.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
}

    h1 {
        margin-bottom: 10px;
        font-size: 28px;
    }

    p {
        font-weight: 300;
        margin-bottom: 20px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    input {
        width: 80%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 16px;
        box-sizing: border-box;
    }

    button {
        width: 80%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #ffdd57;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        box-sizing: border-box;
    }

    button:hover {
        transform: scale(1.03);
    }

    #result {
        margin-top: 20px;
        font-weight: 500;
    }

    .reveal {
        animation: pop 0.6s ease forwards;
    }

    @keyframes pop {
        0% { transform: scale(0.7); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .gift {
        font-size: 50px;
        margin: 10px 0;
    }

    .link-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 12px 18px;
        background: #00c9a7;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="card" id="quizCard">

    <h1>🎉 Happy Birthday SnazRam the Great 🎉</h1>

    <p><strong>04:08</strong></p>

    <div class="input-group">
        <input id="answer" placeholder="" />
        <button onclick="checkAnswer()">Submit</button>
    </div>

    <div id="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function normalize(str) {
    return str
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
}

function checkAnswer() {
    const answer = normalize(document.getElementById("answer").value);

    const correctAnswers = [
        "first light"
    ];

    const closeAnswers = [
        "sunrise",
        "sun rise",
        "dawn",
    ];

    if (correctAnswers.includes(answer)) {
        showSuccess();
        return;
    }

    if (closeAnswers.includes(answer)) {
        document.getElementById("result").innerHTML =
            "🟡 You're close... try again!";
        return;
    }

    document.getElementById("result").innerHTML =
        "❌ Not quite... try again!";
}

function showSuccess() {
    confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 }
    });

    const card = document.getElementById("quizCard");

    card.innerHTML = `
        <div class="reveal">
            <div class="gift">🎁</div>
            <h1>You got it!</h1>
            <p>Clever boy...</p>

            <a class="link-btn"
               href="https://store.steampowered.com/app/3768760/007_First_Light/"
               target="_blank">
                Find My Present
            </a>
        </div>
    `;
}
</script>

</body>
</html>
